name: Testing Github Actions :D
run-name: ${{ github.actor }} is testing the CI pipeline!
on: [push]
jobs:
  Testing-Features:
    runs-on: ubuntu-latest
    steps:
      - run: echo "The event name is ${{ github.event_name }}"
      - run: echo "The job is running on a ${{ runner.os }}"
      - run: echo "The name of the branch is ${{ github.ref }} and the repository is ${{ github.repository }}"
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: echo "The ${{ github.repository }} repo has been cloned to the runner"
      - run: echo "The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "The job status is ${{ job.status }}"
        
      
